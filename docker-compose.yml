version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: mdcalc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mdcalc
      POSTGRES_PASSWORD: mdcalc
      POSTGRES_DB: mdcalc
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: mdcalc-api
    depends_on:
      - db
    environment:
      API_PORT: 4000
      DATABASE_URL: postgres://mdcalc:mdcalc@db:5432/mdcalc
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: mdcalc-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - '3000:3000'

volumes:
  db_data:
